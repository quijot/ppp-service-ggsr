# docker-compose.yml — Entorno de desarrollo local completo
#
# Levanta: Redis + web (FastAPI) + worker (Celery) + Flower (monitor)
# Los volúmenes nombrados (ppp_uploads, ppp_results) son compartidos
# entre web y worker para que ambos puedan acceder a los archivos RINEX.
#
# Uso:
#   docker compose up --build      # primera vez o tras cambios en requirements.txt
#   docker compose up              # arranque normal
#   docker compose restart web worker   # tras editar código Python
#
# Acceso:
#   App:    http://localhost:8000
#   Flower: http://localhost:5555

volumes:
  ppp_uploads:   # archivos RINEX subidos por el usuario (compartido web↔worker)
  ppp_results:   # resultados temporales de NRCan (compartido web↔worker)

services:

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app          # hot reload — cambios en código sin rebuild
      - ./ppp:/app/ppp          # módulos geodésicos y pickles
      - ppp_uploads:/tmp/ppp_uploads
      - ppp_results:/tmp/ppp_results
    environment:
      - REDIS_URL=redis://redis:6379/0
      - PPP_DIR=/app/ppp
      - CSRS_USER_EMAIL=ppp@municipalidad.gob.ar
    depends_on:
      redis:
        condition: service_healthy

  worker:
    build: .
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2
    volumes:
      - ./app:/app/app
      - ./ppp:/app/ppp
      - ppp_uploads:/tmp/ppp_uploads
      - ppp_results:/tmp/ppp_results
    environment:
      - REDIS_URL=redis://redis:6379/0
      - PPP_DIR=/app/ppp
      - CSRS_USER_EMAIL=ppp@municipalidad.gob.ar
    depends_on:
      redis:
        condition: service_healthy

  flower:
    # Dashboard de monitoreo de tareas Celery — solo desarrollo
    build: .
    command: celery -A app.tasks.celery_app flower --port=5555
    ports:
      - "5555:5555"
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
      - worker
