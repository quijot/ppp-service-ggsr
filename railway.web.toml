# railway.toml — Configuración de build y deploy para Railway
#
# Este archivo configura el servicio "web" (FastAPI).
#
# Ver README → Deploy en Railway para el procedimiento completo.

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[deploy.healthcheck]
httpPath = "/health"
intervalSeconds = 30
timeoutSeconds = 10
